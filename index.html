<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>p u z² l e m a n</title>
    
    <!-- 引入指定的 9 款 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anta&family=Black+Ops+One&family=Copse&family=Englebert&family=Fascinate+Inline&family=Meie+Script&family=Ranchers&family=Shrikhand&family=Uncial+Antiqua&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #2c2e30;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
            
            /* 新增：防止長按出現文字選取與原生選單 */
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        /* 共用：膠囊型白底圓角按鈕 */
        .capsule-btn {
            background-color: #f0f0f0;
            color: #2c2e30;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            border-radius: 9999px; /* 撐到最大變橫放的膠囊 */
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            max-width: 90vw;
            line-height: 1.4;
        }

        .capsule-btn:active {
            transform: scale(0.95);
        }

        .capsule-btn:hover {
            background-color: #ffffff;
        }

        /* 開始畫面 */
        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #start-btn {
            letter-spacing: 0.15em;
            text-indent: 0.15em;
        }

        #start-btn span {
            display: inline-block;
        }

        /* 遊戲畫面 */
        #game-screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 拼圖容器：維持 1:1 正方形比例，並在畫面中置中 */
        #puzzle-container {
            width: 90vmin;
            height: 90vmin;
            max-width: 600px;
            max-height: 600px;
            position: relative;
            background-color: #2c2e30;
            touch-action: none;
        }

        /* 單個拼圖方塊的定位與容器 */
        .tile {
            position: absolute;
            top: 0;
            left: 0;
            width: 25%;
            height: 25%;
            padding: 2px;
            box-sizing: border-box;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
        }

        /* 洗牌時加速動畫 */
        .shuffling .tile {
            transition: transform 0.06s linear;
        }

        /* 隱藏的最後一塊拼圖 (過關時顯示) - 4x4 的最後一塊 index 是 15 */
        #tile-15 {
            display: none;
        }

        /* 方塊內的畫布 (繪製即時影像) */
        .tile canvas {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            object-fit: cover;
            display: block;
            background-color: #1a1b1c;
            transform: scaleX(-1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        /* 隱藏的視訊元素 */
        #video-element {
            display: none;
        }

        /* 重新洗牌畫面 */
        #restart-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(44, 46, 48, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 30;
            backdrop-filter: blur(3px);
        }

        #restart-btn {
            font-size: 80px;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #restart-btn:active {
            transform: scale(0.9);
        }

        #loading {
            display: none;
            margin-top: 20px;
            font-size: 16px;
            color: #aaa;
        }

        /* 錯誤畫面 */
        #error-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #2c2e30;
            z-index: 50;
        }

        #error-btn {
            font-size: clamp(16px, 4.5vw, 24px); 
            padding: 20px 35px;
        }
    </style>
</head>
<body>

    <!-- 初始畫面 -->
    <div id="start-screen">
        <button id="start-btn" class="capsule-btn"></button>
        <div id="loading">loading...</div>
    </div>

    <!-- 錯誤畫面 (無相機權限時顯示) -->
    <div id="error-screen">
        <button id="error-btn" class="capsule-btn" onclick="location.reload()">Валя, мне так жаль перед тобой. Ты всё ещё хочешь меня видеть?</button>
    </div>

    <!-- 遊戲畫面 -->
    <div id="game-screen">
        <div id="puzzle-container">
            <!-- 拼圖方塊將由 JS 動態生成 -->
        </div>
        <!-- 重新洗牌畫面 -->
        <div id="restart-screen">
            <button id="restart-btn">🫵</button>
        </div>
    </div>

    <!-- 隱藏的原始相機影片 -->
    <video id="video-element" playsinline autoplay muted></video>

<script>
    // 網頁載入時為按鈕產生隨機字型
    document.addEventListener('DOMContentLoaded', () => {
        const fonts = [
            'Englebert',
            'Uncial Antiqua',
            'Anta',
            'Ranchers',
            'Copse',
            'Fascinate Inline',
            'Shrikhand',
            'Black Ops One',
            'Meie Script'
        ];

        for (let i = fonts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [fonts[i], fonts[j]] = [fonts[j], fonts[i]];
        }

        const word = "puzzleman";
        const btn = document.getElementById('start-btn');
        btn.innerHTML = ''; 

        for (let i = 0; i < word.length; i++) {
            const span = document.createElement('span');
            span.innerText = word[i];
            span.style.fontFamily = `"${fonts[i]}", sans-serif`;
            btn.appendChild(span);
        }
    });

    const startBtn = document.getElementById('start-btn');
    const startScreen = document.getElementById('start-screen');
    const gameScreen = document.getElementById('game-screen');
    const errorScreen = document.getElementById('error-screen');
    const puzzleContainer = document.getElementById('puzzle-container');
    const video = document.getElementById('video-element');
    const loadingText = document.getElementById('loading');
    const restartScreen = document.getElementById('restart-screen');
    const restartBtn = document.getElementById('restart-btn');
    
    let isPlaying = false;
    let isShuffling = false; 
    let board = [];      
    let canvases = [];   
    let contexts = [];   
    let emptyIdx = 15;   
    let hasWon = false;

    const GRID_SIZE = 4;
    const TOTAL_CELLS = GRID_SIZE * GRID_SIZE; 
    const CONTAINER_ASPECT_RATIO = 1 / 1; 
    const SHUFFLE_STEPS = 20; 

    // 啟動相機
    startBtn.addEventListener('click', async () => {
        startBtn.style.display = 'none';
        loadingText.style.display = 'block';

        // 檢查環境是否支援相機存取 (防範 iframe 限制或非 HTTPS 環境錯誤)
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            startScreen.style.display = 'none';
            errorScreen.style.display = 'flex';
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                video.play();
                initGame();
                startScreen.style.display = 'none';
                gameScreen.style.display = 'flex';
                isPlaying = true;
                requestAnimationFrame(drawTiles);
            };
        } catch (err) {
            // 避免預覽環境跳出紅字錯誤警告，直接顯示使用者設定的錯誤介面
            startScreen.style.display = 'none';
            errorScreen.style.display = 'flex';
        }
    });

    // 初始化遊戲
    function initGame() {
        puzzleContainer.innerHTML = '';
        board = [];
        canvases = [];
        contexts = [];
        hasWon = false;

        for (let i = 0; i < TOTAL_CELLS; i++) {
            board.push(i);

            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.id = `tile-${i}`;
            
            const canvas = document.createElement('canvas');
            canvases.push(canvas);
            contexts.push(canvas.getContext('2d', { alpha: false }));

            tile.appendChild(canvas);
            
            // 點擊事件：移動方塊
            tile.addEventListener('click', () => handleTileClick(i));

            // 滑動與拖曳支援
            let startX = 0;
            let startY = 0;

            tile.addEventListener('pointerdown', (e) => {
                startX = e.clientX;
                startY = e.clientY;
                tile.setPointerCapture(e.pointerId);
            });

            tile.addEventListener('pointerup', (e) => {
                tile.releasePointerCapture(e.pointerId);
                
                if (hasWon || isShuffling || i === 15) return;
                
                const diffX = e.clientX - startX;
                const diffY = e.clientY - startY;

                // 如果移動距離太短（<15px），視為單純點擊
                if (Math.abs(diffX) < 15 && Math.abs(diffY) < 15) return;

                const currentIdx = board.indexOf(i);
                
                const row = Math.floor(currentIdx / GRID_SIZE);
                const col = currentIdx % GRID_SIZE;
                const eRow = Math.floor(emptyIdx / GRID_SIZE);
                const eCol = emptyIdx % GRID_SIZE;

                let isValidSwipe = false;
                
                // 更新滑動判斷：不再限制「必須相鄰」，只要與空格在同行或同列，且滑動方向正確即可
                if (row === eRow && eCol > col && diffX > 20 && Math.abs(diffX) > Math.abs(diffY)) isValidSwipe = true; // 往右滑
                else if (row === eRow && eCol < col && diffX < -20 && Math.abs(diffX) > Math.abs(diffY)) isValidSwipe = true; // 往左滑
                else if (col === eCol && eRow > row && diffY > 20 && Math.abs(diffY) > Math.abs(diffX)) isValidSwipe = true; // 往下滑
                else if (col === eCol && eRow < row && diffY < -20 && Math.abs(diffY) > Math.abs(diffX)) isValidSwipe = true; // 往上滑

                if (isValidSwipe) {
                    handleTileClick(i);
                }
            });
            
            puzzleContainer.appendChild(tile);
        }

        updateTilePositions();
        startShuffleAnimation();
    }

    // 處理方塊點擊或滑動成功：支援整排推動
    function handleTileClick(pieceId) {
        if (hasWon || isShuffling) return; 
        if (pieceId === 15) return; 

        const currentIdx = board.indexOf(pieceId);
        
        const row = Math.floor(currentIdx / GRID_SIZE);
        const col = currentIdx % GRID_SIZE;
        const eRow = Math.floor(emptyIdx / GRID_SIZE);
        const eCol = emptyIdx % GRID_SIZE;

        // 判斷是否在同一行 (Row相同)
        if (row === eRow) {
            if (col < eCol) {
                // 點擊方塊在空格左側 -> 往右推
                // 迴圈由靠近空格的那端開始把前面的方塊往後拉
                for (let i = eCol; i > col; i--) {
                    const idx = row * GRID_SIZE + i;
                    const prevIdx = row * GRID_SIZE + (i - 1);
                    board[idx] = board[prevIdx];
                }
            } else {
                // 點擊方塊在空格右側 -> 往左推
                for (let i = eCol; i < col; i++) {
                    const idx = row * GRID_SIZE + i;
                    const nextIdx = row * GRID_SIZE + (i + 1);
                    board[idx] = board[nextIdx];
                }
            }
            // 將原本點擊的位置設為新空格
            board[row * GRID_SIZE + col] = 15;
            emptyIdx = currentIdx;

            updateTilePositions();
            checkWin();
        } 
        // 判斷是否在同一列 (Col相同)
        else if (col === eCol) {
            if (row < eRow) {
                // 點擊方塊在空格上方 -> 往下推
                for (let i = eRow; i > row; i--) {
                    const idx = i * GRID_SIZE + col;
                    const prevIdx = (i - 1) * GRID_SIZE + col;
                    board[idx] = board[prevIdx];
                }
            } else {
                // 點擊方塊在空格下方 -> 往上推
                for (let i = eRow; i < row; i++) {
                    const idx = i * GRID_SIZE + col;
                    const nextIdx = (i + 1) * GRID_SIZE + col;
                    board[idx] = board[nextIdx];
                }
            }
            // 將原本點擊的位置設為新空格
            board[row * GRID_SIZE + col] = 15;
            emptyIdx = currentIdx;

            updateTilePositions();
            checkWin();
        }
    }

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    // 打亂拼圖展演動畫
    async function startShuffleAnimation() {
        isShuffling = true;
        puzzleContainer.classList.add('shuffling'); 
        emptyIdx = 15;
        let lastMove = -1;
        let simEmptyIdx = 15;
        
        const moveSequence = [];

        // 洗牌時，一樣隨機挑選相鄰的方塊進行 1 步 1 步交換（確保必定有解且展演效果流暢）
        for (let i = 0; i < SHUFFLE_STEPS; i++) {
            const validMoves = getValidMoves(simEmptyIdx);
            const filteredMoves = validMoves.filter(move => move !== lastMove);
            const nextPos = filteredMoves.length > 0 
                ? filteredMoves[Math.floor(Math.random() * filteredMoves.length)] 
                : validMoves[0];

            moveSequence.push(nextPos);
            lastMove = simEmptyIdx;
            simEmptyIdx = nextPos;
        }

        document.getElementById('tile-15').style.display = 'none';

        for (let i = 0; i < SHUFFLE_STEPS; i++) {
            const targetPos = moveSequence[i];
            
            // 自動展演的交換
            const pieceId = board[targetPos];
            board[emptyIdx] = pieceId;
            board[targetPos] = 15;
            emptyIdx = targetPos;

            updateTilePositions();
            await sleep(60); 
        }

        isShuffling = false; 
        puzzleContainer.classList.remove('shuffling'); 
    }

    // 取得相鄰的有效步伐 (專門提供給洗牌動畫使用)
    function getValidMoves(emptyIndex) {
        const moves = [];
        const row = Math.floor(emptyIndex / GRID_SIZE);
        const col = emptyIndex % GRID_SIZE;

        if (row > 0) moves.push(emptyIndex - GRID_SIZE); // 上
        if (row < GRID_SIZE - 1) moves.push(emptyIndex + GRID_SIZE); // 下
        if (col > 0) moves.push(emptyIndex - 1); // 左
        if (col < GRID_SIZE - 1) moves.push(emptyIndex + 1); // 右

        return moves;
    }

    function updateTilePositions() {
        for (let i = 0; i < TOTAL_CELLS; i++) {
            const pieceId = board[i];
            const tileEl = document.getElementById(`tile-${pieceId}`);
            
            const row = Math.floor(i / GRID_SIZE);
            const col = i % GRID_SIZE;

            tileEl.style.transform = `translate(${col * 100}%, ${row * 100}%)`;
        }
    }

    function checkWin() {
        for (let i = 0; i < TOTAL_CELLS; i++) {
            if (board[i] !== i) return false;
        }
        
        hasWon = true;
        document.getElementById('tile-15').style.display = 'block';
        
        setTimeout(() => {
            restartScreen.style.display = 'flex';
        }, 1000);
        return true;
    }

    restartBtn.addEventListener('click', () => {
        restartScreen.style.display = 'none';
        hasWon = false;
        startShuffleAnimation(); 
    });

    function drawTiles() {
        if (!isPlaying) return;

        const vidW = video.videoWidth;
        const vidH = video.videoHeight;

        if (vidW === 0 || vidH === 0) {
            requestAnimationFrame(drawTiles);
            return;
        }

        const vidAspect = vidW / vidH;
        let cropW, cropH, startX, startY;

        if (vidAspect > CONTAINER_ASPECT_RATIO) {
            cropH = vidH;
            cropW = vidH * CONTAINER_ASPECT_RATIO;
            startX = (vidW - cropW) / 2;
            startY = 0;
        } else {
            cropW = vidW;
            cropH = vidW / CONTAINER_ASPECT_RATIO;
            startX = 0;
            startY = (vidH - cropH) / 2;
        }

        const tileSourceW = cropW / GRID_SIZE;
        const tileSourceH = cropH / GRID_SIZE;

        for (let i = 0; i < TOTAL_CELLS; i++) {
            const canvas = canvases[i];
            const ctx = contexts[i];

            const o_row = Math.floor(i / GRID_SIZE);
            const o_col = i % GRID_SIZE;

            const raw_col = (GRID_SIZE - 1) - o_col;

            const sx = startX + raw_col * tileSourceW;
            const sy = startY + o_row * tileSourceH;

            if (canvas.width !== Math.floor(tileSourceW)) {
                canvas.width = Math.floor(tileSourceW);
                canvas.height = Math.floor(tileSourceH);
            }

            ctx.drawImage(video, sx, sy, tileSourceW, tileSourceH, 0, 0, canvas.width, canvas.height);
        }

        requestAnimationFrame(drawTiles);
    }
</script>
</body>
</html>
